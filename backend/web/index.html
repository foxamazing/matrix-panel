  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Default: Ark Pixel Font (12px Monospaced Chinese Simplified) via jsDelivr -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ark-pixel-font@latest/display/ark-pixel-12px-monospaced-zh_cn.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            // Base config, overwritten by dynamic class in App.tsx
            pixel: ['"Ark Pixel 12px Monospaced ZhCn"', 'monospace'],
          },
          animation: {
            'blob': 'blob 10s infinite',
            'fade-in': 'fadeIn 0.5s ease-out',
            'spin-slow': 'spin 8s linear infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Hide Scrollbar Globally */
    ::-webkit-scrollbar {
      width: 0px !important;
      height: 0px !important;
      display: none !important;
    }

    * {
      scrollbar-width: none !important;
      /* Firefox */
      -ms-overflow-style: none !important;
      /* IE 10+ */
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .dark .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Lyrics Scroll Mask */
    .lyrics-mask {
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
    }

    /* Remove vertical blinking cursors globally */
    input,
    textarea,
    [contenteditable] {
      caret-color: transparent !important;
    }
  </style>
