basePath: /api/v1
definitions:
  models.User:
    type: object
  system.LoginLoginVerify:
    properties:
      email:
        type: string
      password:
        maxLength: 50
        type: string
      username:
        type: string
      vcode:
        maxLength: 6
        type: string
    required:
    - password
    - username
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API documentation for Antigravity Dashboard
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Antigravity API
  version: "1.0"
paths:
  /api/panel/users/create:
    post:
      consumes:
      - application/json
      description: 注册新用户
      parameters:
      - description: 用户注册信息
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 创建用户
      tags:
      - User
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登陆验证信息
        in: body
        name: LoginLoginVerify
        required: true
        schema:
          $ref: '#/definitions/system.LoginLoginVerify'
      produces:
      - application/json
      responses: {}
      summary: 登录账号
      tags:
      - user
swagger: "2.0"
